name: RelationshipAnalytics
options:
  bundleIdPrefix: com.relationshipanalytics
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    # Set DEVELOPMENT_TEAM to your 10-char Apple Developer Team ID before archiving.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:

  # iOS App
  RelationshipAnalytics-iOS:
    type: application
    platform: iOS
    sources:
      - path: iOS
        excludes:
          - "**/*.xcassets"
          - Info.plist
      - path: Shared
    resources:
      - path: iOS/Resources/Assets.xcassets
    info:
      path: iOS/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSPhotoLibraryUsageDescription: "Access your photos to find pictures with this contact"
        CFBundleURLTypes:
          - CFBundleURLSchemes: [ra, relationshipanalytics]
            CFBundleURLName: "com.relationshipanalytics.ios"
        BGTaskSchedulerPermittedIdentifiers:
          - "com.relationshipanalytics.refresh"
        UIBackgroundModes:
          - fetch
          - processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.relationshipanalytics.ios
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: iOS/RelationshipAnalytics.entitlements

  # macOS App
  RelationshipAnalytics-macOS:
    type: application
    platform: macOS
    sources:
      - path: macOS
        excludes:
          - "**/*.xcassets"
          - Info.plist
      - path: Shared
    resources:
      - path: macOS/Resources/Assets.xcassets
    info:
      path: macOS/Info.plist
      properties:
        LSUIElement: false
        NSContactsUsageDescription: "Access your contacts to show names instead of phone numbers"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.relationshipanalytics.macos
        CODE_SIGN_ENTITLEMENTS: macOS/RelationshipAnalytics.entitlements
        ENABLE_PREVIEWS: YES
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # macOS distribution: Developer ID + notarization (NOT Mac App Store / TestFlight).
        # The app reads ~/Library/Messages/chat.db which requires user-granted Full Disk Access
        # and is incompatible with App Sandbox, which MAS requires.

schemes:
  RelationshipAnalytics-iOS:
    build:
      targets:
        RelationshipAnalytics-iOS: all
    run:
      config: Debug

  RelationshipAnalytics-macOS:
    build:
      targets:
        RelationshipAnalytics-macOS: all
    run:
      config: Debug
