name: RelationshipAnalytics
options:
  bundleIdPrefix: com.relationshipanalytics
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:

  # iOS App
  RelationshipAnalytics-iOS:
    type: application
    platform: iOS
    sources:
      - path: iOS
        excludes:
          - "**/*.xcassets"
      - path: Shared
    resources:
      - path: iOS/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.relationshipanalytics.ios
        INFOPLIST_VALUES:
          CFBundleDisplayName: "Relationship Analytics"
          CFBundleName: "RelationshipAnalytics"
          CFBundleShortVersionString: "1.0.0"
          CFBundleVersion: "1"
          UILaunchScreen: {}
          UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES

  # macOS App
  RelationshipAnalytics-macOS:
    type: application
    platform: macOS
    sources:
      - path: macOS
        excludes:
          - "**/*.xcassets"
      - path: Shared
    resources:
      - path: macOS/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.relationshipanalytics.macos
        INFOPLIST_VALUES:
          CFBundleDisplayName: "Relationship Analytics Sync"
          CFBundleName: "RelationshipAnalyticsSync"
          CFBundleShortVersionString: "1.0.0"
          CFBundleVersion: "1"
          LSUIElement: false
        CODE_SIGN_ENTITLEMENTS: macOS/RelationshipAnalytics.entitlements
        ENABLE_PREVIEWS: YES

schemes:
  RelationshipAnalytics-iOS:
    build:
      targets:
        RelationshipAnalytics-iOS: all
    run:
      config: Debug

  RelationshipAnalytics-macOS:
    build:
      targets:
        RelationshipAnalytics-macOS: all
    run:
      config: Debug
